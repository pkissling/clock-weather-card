name: Lint

on:
  push:

jobs:
  build:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Build
        run: |
          yarn install
          yarn build
          
      - name: Lint
        run: |
          yarn lint
